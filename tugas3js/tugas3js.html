<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Toko Real-Time</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; min-width: 150px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #007bff; color: white; }
        .btn-add:hover { background: #0056b3; }
        .btn-delete { background: #ff4757; color: white; padding: 5px 12px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; text-transform: uppercase; font-size: 13px; }
        tr:hover { background: #fcfcfc; }
        .empty-state { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Manajemen Pesanan Toko Online</h2>
    <hr><br>

    <div class="input-group">
        <input type="text" id="nama" placeholder="Nama Produk (ex: Headset)">
        <input type="number" id="harga" placeholder="Harga (Rp)">
        <input type="number" id="stok" placeholder="Jumlah Stok">
        <button class="btn-add" onclick="inputData()">Tambah ke Tabel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Produk</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="live-table-body">
            </tbody>
    </table>
    <div id="no-data" class="empty-state" style="display: none;">Belum ada produk terdaftar.</div>
</div>

<script src="tugas3js.js"></script>
</body>
</html>
